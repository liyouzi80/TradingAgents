name: 🎯 Manual Analysis (手动临时分析)

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: '标的列表 (逗号分隔，如 NVDA,AAPL,TSLA)'
        required: true
        default: 'NVDA'
      analysis_date:
        description: '分析日期 (YYYY-MM-DD，留空则自动)'
        required: false
        default: ''

jobs:
  run:
    name: 手动分析
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install .
          pip install requests

      - name: Prepare tickers from input
        run: |
          echo "${{ github.event.inputs.tickers }}" | tr ',' '\n' | sed 's/ //g' > tickers.txt
          echo "=== Manual Tickers ==="
          cat tickers.txt

      - name: Generate trading report
        id: report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEP_THINK_MODEL: ${{ secrets.DEEP_THINK_MODEL }}
          QUICK_THINK_MODEL: ${{ secrets.QUICK_THINK_MODEL }}
          MAX_DEBATE_ROUNDS: '1'
          ANALYSIS_DATE: ${{ github.event.inputs.analysis_date }}
        run: |
          python -u scripts/auto_report.py

      - name: Send notifications
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REPORT_PATH: ${{ steps.report.outputs.report_path }}
          JSON_PATH: ${{ steps.report.outputs.json_path }}
          ANALYSIS_DATE: ${{ steps.report.outputs.analysis_date }}
          TICKERS: ${{ steps.report.outputs.tickers }}
          REPORT_GROUP: 'Manual'
        run: |
          python -u scripts/notify.py

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-${{ steps.report.outputs.analysis_date || 'unknown' }}
          path: reports/
          retention-days: 30

      - name: Commit reports back to repo
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "📊 Report: ${{ steps.report.outputs.analysis_date }} (${{ steps.report.outputs.tickers }})"
          git push
