name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'reports/summary_*.json'
      - 'dashboard/**'
      - 'scripts/aggregate_reports.py'
      - 'tickers/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Aggregate reports
        run: python3 scripts/aggregate_reports.py reports/ dashboard/

      - name: Assemble site
        run: |
          mkdir -p _site
          cp dashboard/* _site/
          cp reports/summary_*.json _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
